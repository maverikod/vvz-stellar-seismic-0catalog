# Author: Vasiliy Zdanovskiy
# email: vasilyvz@gmail.com

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Black
        run: black --check .
      - name: Flake8
        run: flake8 stellar_seismic_catalog tests scripts
      - name: Mypy
        run: mypy stellar_seismic_catalog
      - name: Pytest
        run: pytest tests -v
